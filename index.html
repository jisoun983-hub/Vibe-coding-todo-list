<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Todo App</title>
    <!-- Paperlogy (페이퍼로지체) webfont -->
    <style>
      @font-face {
        font-family: "Paperozi";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-4Regular.woff2")
          format("woff2");
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: "Paperozi";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2408-3@1.0/Paperlogy-9Black.woff2")
          format("woff2");
        font-weight: 900;
        font-display: swap;
      }
    </style>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app" aria-label="할 일 앱">
      <header class="header">
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <svg viewBox="0 0 64 64" width="50" height="50" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="petal" x1="52" y1="32" x2="12" y2="32" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#FB7185" />
                  <stop offset="1" stop-color="#EC4899" />
                </linearGradient>
                <linearGradient id="stem" x1="30" y1="28" x2="34" y2="62" gradientUnits="userSpaceOnUse">
                  <stop stop-color="#34D399" />
                  <stop offset="1" stop-color="#10B981" />
                </linearGradient>
              </defs>
              <path
                d="M33 10c2 1 4 4 3 7 3-2 7-2 9 1 2 3 1 7-2 9 4 0 7 3 7 7 0 4-3 7-7 7 2 3 1 7-2 9-3 2-7 1-9-2 1 3-1 6-3 7-2-1-4-4-3-7-3 3-7 4-10 2-3-2-4-6-2-9-4 0-7-3-7-7 0-4 3-7 7-7-3-2-4-6-2-9 2-3 6-3 9-1-1-3 1-6 3-7Z"
                fill="#ffffff"
                opacity="0.95"
              />
              <path d="M32 28c-1 6-1 14 1 24" stroke="url(#stem)" stroke-width="4" stroke-linecap="round" />
              <path
                d="M36 44c5 1 8 4 10 8-5 0-9-2-12-5"
                stroke="#10B981"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
                opacity="0.9"
              />
              <path
                d="M28 46c-5 1-8 4-10 8 5 0 9-2 12-5"
                stroke="#10B981"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
                opacity="0.85"
              />
            </svg>
          </div>
          <div>
            <h1 class="title">
              <span class="soUn">SO-UN</span>
              의 <span class="successWord">성공</span> to-do 리스트
            </h1>
            <p class="subtitle">애플 느낌의 미니멀 투두 · 자동 저장</p>
          </div>
        </div>

        <div class="stats" aria-live="polite">
          <span id="countText">0개</span>
        </div>
      </header>

      <section class="panel">
        <form id="addForm" class="add" autocomplete="off">
          <label class="srOnly" for="newTodo">할 일 입력</label>
          <input
            id="newTodo"
            name="newTodo"
            type="text"
            placeholder="예) 운동 30분 하기"
            maxlength="120"
          />
          <button class="btn primary" type="submit">추가</button>
        </form>

        <div class="toolbar">
          <div class="searchSort">
            <label class="srOnly" for="searchInput">검색</label>
            <input id="searchInput" type="text" placeholder="검색…" maxlength="120" />

            <label class="srOnly" for="sortSelect">정렬</label>
            <select id="sortSelect" class="select" aria-label="정렬">
              <option value="newest">최신순</option>
              <option value="oldest">오래된순</option>
              <option value="activeFirst">미완료 우선</option>
            </select>
          </div>

          <div class="filters" role="tablist" aria-label="필터">
            <button class="chip isActive" type="button" data-filter="all">전체</button>
            <button class="chip" type="button" data-filter="active">미완료</button>
            <button class="chip" type="button" data-filter="done">완료</button>
          </div>
          <button id="clearDoneBtn" class="btn ghost" type="button">완료 삭제</button>
        </div>

        <ul id="list" class="list" aria-label="할 일 목록"></ul>

        <footer class="footer">
          <button id="clearAllBtn" class="btn danger" type="button">전체 삭제</button>
          <span class="hint">팁: 더블클릭으로 빠른 수정</span>
        </footer>
      </section>
    </main>

    <dialog id="editDialog" class="dialog" aria-label="할 일 수정">
      <form id="editForm" method="dialog" class="dialogBody">
        <header class="dialogHeader">
          <h2 class="dialogTitle">수정</h2>
          <button class="iconBtn" type="button" id="closeDialogBtn" aria-label="닫기">
            ✕
          </button>
        </header>

        <label class="srOnly" for="editInput">할 일 수정</label>
        <input id="editInput" type="text" maxlength="120" />
        <div class="dialogActions">
          <button class="btn ghost" type="button" id="cancelEditBtn">취소</button>
          <button class="btn primary" type="submit">저장</button>
        </div>
      </form>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
